upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Increase client body size for code uploads
    client_max_body_size 10M;

    # Serve generated media files directly — bypasses FastAPI for speed
    location /media/ {
        alias /app/media/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        types {
            video/mp4  mp4;
            audio/mpeg mp3;
        }
    }

    # Route all /api/ requests to FastAPI
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # WebSocket support for future live updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Route everything else to the React frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;

        # Required for React Router (client-side routing)
        proxy_intercept_errors on;
        error_page 404 = @frontend;
    }

    location @frontend {
        proxy_pass http://frontend;
    }
}
